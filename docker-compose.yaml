# DEV ONLY — for local octo-marketplace development.
#
# The credentials below are intentionally simple and must not be used in
# production. Production deployment must provide rotated secrets and managed
# persistence through the OCTO deployment repository.
#
# Requires: octo-minio-1 running on octo_octo-net (from octo main compose).
services:
  marketplace-service:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8092:8092"
    environment:
      APP_ENV: "dev"
      MYSQL_DSN: "marketplace:marketplace@tcp(mysql:3306)/octo_marketplace?charset=utf8mb4&parseTime=true"
      API_PORT: "8092"
      AUTH_ENABLED: "true"
      OCTO_API_URL: "https://im-test.deepminer.com.cn"
      STORAGE_DRIVER: "oss"
      OSS_ENDPOINT: "http://172.28.0.2:9000"
      OSS_BUCKET: "skill"
      OSS_ACCESS_KEY: "octo-app"
      OSS_SECRET_KEY: "27ed0b4f52a7a7bef21bff4bfcfcb0b2"
      OSS_PUBLIC_BASE_URL: "http://localhost:29000/skill"
      OSS_PUBLIC_ENDPOINT: "http://localhost:29000"
      OSS_REGION: "us-east-1"
    networks:
      - default
      - octo-net
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: docker.m.daocloud.io/mysql:8.0
    environment:
      MYSQL_DATABASE: octo_marketplace
      MYSQL_USER: marketplace
      MYSQL_PASSWORD: marketplace
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  octo-net:
    external: true
    name: octo_octo-net

volumes:
  mysqldata:
